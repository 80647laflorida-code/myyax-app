function renderAsistencia(cont){
  var TAREAS_BASE = [
    { id:'t1', txt:'Alimentación de la mañana', desc:'Verificar apetito y cantidad consumida' },
    { id:'t2', txt:'Medición de calidad de agua', desc:'Temperatura, pH y oxígeno' },
    { id:'t3', txt:'Inspección visual de las truchas', desc:'Comportamiento y mortalidad' },
    { id:'t4', txt:'Limpieza de estanques / mallas', desc:'Retirar restos y sedimentos' },
    { id:'t5', txt:'Alimentación de la tarde', desc:'Segunda ración del día' },
    { id:'t6', txt:'Registro en bitácora', desc:'Anotar observaciones del día' }
  ];

  var hoy = TAPP.fechaHoy();
  var registrosAsist = TAPP.leer('asistencia', {}); // { 'YYYY-MM-DD': {t1:true, t2:false, ...} }
  var checkHoy = registrosAsist[hoy] || {};

  var html = '';

  html += '<div class="info-box">📋 Marca las tareas que completaste hoy <strong>' + TAPP.formatoFechaCorta(hoy) + '</strong>. El progreso se guarda automáticamente por día.</div>';

  function progreso(){
    var hechas = TAREAS_BASE.filter(function(t){ return checkHoy[t.id]; }).length;
    return Math.round((hechas / TAREAS_BASE.length) * 100);
  }

  html += '<div class="card" style="text-align:center;">' +
    '<div style="font-size:13px;font-weight:700;color:var(--azul-prof);margin-bottom:8px;">Progreso de hoy</div>' +
    '<div style="font-size:30px;font-weight:800;color:var(--azul-medio);" id="as-progreso">' + progreso() + '%</div>' +
    '<div class="medidor-barra" style="background:#E0EAF0;margin-top:10px;"><div id="as-barra" style="height:100%;background:linear-gradient(90deg,var(--azul-claro),var(--azul-medio));border-radius:6px;width:'+progreso()+'%;transition:width 0.3s;"></div></div>' +
  '</div>';

  html += '<button class="btn-compartir" id="as-compartir"><span class="ico">📤</span> Compartir progreso de hoy</button>';

  html += '<div class="seccion-titulo">Tareas de hoy</div>';
  html += '<div id="as-lista">';
  TAREAS_BASE.forEach(function(t){
    html += '<div class="check-item">' +
      '<input type="checkbox" id="chk-' + t.id + '" ' + (checkHoy[t.id] ? 'checked' : '') + '>' +
      '<div class="ci-txt"><label for="chk-' + t.id + '">' + t.txt + '<small>' + t.desc + '</small></label></div>' +
    '</div>';
  });
  html += '</div>';

  html += '<div class="seccion-titulo">Historial de asistencia</div>';
  html += '<div id="as-historial"></div>';

  cont.innerHTML = html;

  function actualizarProgreso(){
    var pct = progreso();
    document.getElementById('as-progreso').textContent = pct + '%';
    document.getElementById('as-barra').style.width = pct + '%';
  }

  TAREAS_BASE.forEach(function(t){
    document.getElementById('chk-' + t.id).addEventListener('change', function(e){
      checkHoy[t.id] = e.target.checked;
      registrosAsist[hoy] = checkHoy;
      TAPP.guardar('asistencia', registrosAsist);
      actualizarProgreso();
      renderHistorial();
    });
  });

  function renderHistorial(){
    var dias = Object.keys(registrosAsist).sort().reverse().slice(0, 10);
    var hist = document.getElementById('as-historial');
    if (dias.length === 0) {
      hist.innerHTML = '<div class="vacio-msg"><div class="vm-icono">📋</div><p>Aún no hay historial</p></div>';
      return;
    }
    hist.innerHTML = dias.map(function(d){
      var chk = registrosAsist[d];
      var hechas = TAREAS_BASE.filter(function(t){ return chk[t.id]; }).length;
      var pct = Math.round((hechas/TAREAS_BASE.length)*100);
      var color = pct === 100 ? 'var(--verde-ok)' : (pct >= 50 ? 'var(--amber)' : 'var(--rojo)');
      var bg = pct === 100 ? '#E3F6EA' : (pct >= 50 ? '#FDF1DF' : '#FBE6E6');
      return '<div class="registro-item">' +
        '<div class="ri-icono" style="background:'+bg+';color:'+color+';">📋</div>' +
        '<div class="ri-info"><div class="ri-titulo">' + hechas + ' / ' + TAREAS_BASE.length + ' tareas</div><div class="ri-detalle">' + pct + '% completado</div></div>' +
        '<div class="ri-fecha">' + TAPP.formatoFechaCorta(d) + '</div>' +
      '</div>';
    }).join('');
  }

  renderHistorial();

  document.getElementById('as-compartir').addEventListener('click', function(){
    var hechas = TAREAS_BASE.filter(function(t){ return checkHoy[t.id]; });
    var pendientes = TAREAS_BASE.filter(function(t){ return !checkHoy[t.id]; });

    var texto = [
      '📋 *Asistencia a Prácticas — MYYAX*', '',
      '📅 ' + TAPP.formatoFechaCorta(hoy),
      '✅ Progreso: ' + progreso() + '% (' + hechas.length + '/' + TAREAS_BASE.length + ' tareas)', ''
    ];
    if (hechas.length > 0) {
      texto.push('Completadas:');
      hechas.forEach(function(t){ texto.push('✓ ' + t.txt); });
      texto.push('');
    }
    if (pendientes.length > 0) {
      texto.push('Pendientes:');
      pendientes.forEach(function(t){ texto.push('○ ' + t.txt); });
    }

    TAPP.compartirMenu(
      { titulo:'Asistencia a Prácticas', texto: texto.join('\n') },
      { titulo:'Asistencia a Prácticas', subtitulo: TAPP.formatoFechaCorta(hoy), icono:'📋',
        color:'#5B8DEF', colorOscuro:'#3858B8',
        filas: [
          { label:'Progreso del día', valor: progreso() + '%' },
          { label:'Tareas completadas', valor: hechas.length + ' / ' + TAREAS_BASE.length },
          { label:'Pendientes', valor: pendientes.length }
        ],
        archivoNombre:'asistencia' }
    );
  });
}

function renderClima(cont){

  // Ubicación por defecto: Aprisca Huamachuco (usa coordenadas de Huamachuco,
  // ya que "Aprisca" es un caserío sin registro propio en bases de geocodificación)
  var CIUDAD_DEFAULT = { nombre:'Aprisca Huamachuco', pais:'La Libertad, Perú', lat:-7.8121, lon:-78.0487 };

  var html = '';
  html += '<div class="buscador" style="position:relative;">' +
    '<input type="text" id="cl-input" placeholder="Buscar otra ubicación..." autocomplete="off" ' +
      'style="flex:1;border:1.5px solid var(--borde);border-radius:14px;padding:11px 14px;font-size:14px;outline:none;">' +
    '<button id="cl-buscar" style="border:none;background:var(--azul-medio);color:#fff;width:44px;border-radius:14px;font-size:17px;">🔍</button>' +
    '<div class="sugerencias" id="cl-sugerencias" style="position:absolute;top:50px;left:0;right:44px;background:#fff;border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,0.18);overflow:hidden;z-index:50;display:none;"></div>' +
  '</div>';

  html += '<div id="cl-resultado"><div class="estado-msg" style="text-align:center;padding:40px;color:var(--gris-claro);">Cargando clima...</div></div>';

  cont.innerHTML = html;

  var resultado = document.getElementById('cl-resultado');
  var inputCiudad = document.getElementById('cl-input');
  var btnBuscar = document.getElementById('cl-buscar');
  var sugerencias = document.getElementById('cl-sugerencias');

  function infoClimaCodigo(code, esNoche){
    var map = {
      0:{ico:'☀️',desc:'Despejado',tipo:'soleado'}, 1:{ico:'🌤️',desc:'Mayormente despejado',tipo:'soleado'},
      2:{ico:'⛅',desc:'Parcialmente nublado',tipo:'nublado'}, 3:{ico:'☁️',desc:'Nublado',tipo:'nublado'},
      45:{ico:'🌫️',desc:'Neblina',tipo:'niebla'}, 48:{ico:'🌫️',desc:'Niebla escarchada',tipo:'niebla'},
      51:{ico:'🌦️',desc:'Llovizna ligera',tipo:'lluvia'}, 53:{ico:'🌦️',desc:'Llovizna',tipo:'lluvia'},
      55:{ico:'🌧️',desc:'Llovizna intensa',tipo:'lluvia'}, 61:{ico:'🌧️',desc:'Lluvia ligera',tipo:'lluvia'},
      63:{ico:'🌧️',desc:'Lluvia moderada',tipo:'lluvia'}, 65:{ico:'🌧️',desc:'Lluvia intensa',tipo:'lluvia'},
      71:{ico:'🌨️',desc:'Nevada ligera',tipo:'nieve'}, 73:{ico:'🌨️',desc:'Nevada moderada',tipo:'nieve'},
      75:{ico:'❄️',desc:'Nevada intensa',tipo:'nieve'}, 80:{ico:'🌦️',desc:'Lluvia ligera',tipo:'lluvia'},
      81:{ico:'🌧️',desc:'Lluvia moderada',tipo:'lluvia'}, 82:{ico:'⛈️',desc:'Lluvia violenta',tipo:'tormenta'},
      95:{ico:'⛈️',desc:'Tormenta eléctrica',tipo:'tormenta'}, 96:{ico:'⛈️',desc:'Tormenta con granizo',tipo:'tormenta'},
      99:{ico:'⛈️',desc:'Tormenta fuerte',tipo:'tormenta'}
    };
    var info = map[code] || { ico:'🌡️', desc:'Variable', tipo:'nublado' };
    if (esNoche && info.tipo === 'soleado') info = { ico: code===0?'🌙':'🌥️', desc: code===0?'Despejado':'Parc. nublado', tipo:'noche' };
    return info;
  }

  function fondoTipo(tipo){
    var map = {
      soleado:'linear-gradient(160deg,#6FCBF5,#3FA9E8)', nublado:'linear-gradient(160deg,#4A8FE0,#3868C9)',
      lluvia:'linear-gradient(160deg,#5C5FC9,#3D3FA8)', tormenta:'linear-gradient(160deg,#4A6FE0,#2C4CC4)',
      nieve:'linear-gradient(160deg,#A8C8EE,#7FA8DB)', noche:'linear-gradient(160deg,#2A2E7A,#161A52)',
      niebla:'linear-gradient(160deg,#7A8AA8,#586886)'
    };
    return map[tipo] || map.soleado;
  }

  function cargarClima(ciudad){
    resultado.innerHTML = '<div class="estado-msg" style="text-align:center;padding:40px;color:var(--gris-claro);">Cargando clima de ' + ciudad.nombre + '...</div>';

    var url = 'https://api.open-meteo.com/v1/forecast' +
      '?latitude=' + ciudad.lat + '&longitude=' + ciudad.lon +
      '&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,is_day' +
      '&daily=weather_code,temperature_2m_max,temperature_2m_min' +
      '&timezone=auto&forecast_days=5';

    fetch(url)
      .then(function(r){ if(!r.ok) throw new Error(); return r.json(); })
      .then(function(data){ render(data, ciudad); })
      .catch(function(){
        resultado.innerHTML = '<div class="estado-msg" style="text-align:center;padding:40px;color:var(--rojo);">⚠️ No se pudo cargar el clima de ' + ciudad.nombre + '.</div>';
      });
  }

  function render(data, ciudad){
    var cur = data.current;
    var esNoche = cur.is_day === 0;
    var info = infoClimaCodigo(cur.weather_code, esNoche);
    var temp = Math.round(cur.temperature_2m);
    var sens = Math.round(cur.apparent_temperature);
    var hum = cur.relative_humidity_2m;
    var viento = Math.round(cur.wind_speed_10m);

    var diasSemana = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    var diasHTML = '';
    for (var d=0; d<Math.min(5,data.daily.time.length); d++){
      var fecha = new Date(data.daily.time[d] + 'T00:00:00');
      var nombreDia = d===0 ? 'Hoy' : diasSemana[fecha.getDay()];
      var dInfo = infoClimaCodigo(data.daily.weather_code[d], false);
      var max = Math.round(data.daily.temperature_2m_max[d]);
      var min = Math.round(data.daily.temperature_2m_min[d]);
      diasHTML += '<div style="display:flex;align-items:center;padding:9px 4px;border-bottom:1px solid rgba(255,255,255,0.15);font-size:13px;color:#fff;">' +
        '<div style="flex:1;font-weight:700;">' + nombreDia + '</div>' +
        '<div style="flex:0.5;font-size:20px;text-align:center;">' + dInfo.ico + '</div>' +
        '<div style="flex:1;text-align:right;font-weight:700;">' + max + '°<span style="opacity:0.65;margin-left:6px;">' + min + '°</span></div>' +
      '</div>';
    }

    var relevanciaPiscicola = '';
    if (temp <= 5) relevanciaPiscicola = '🥶 Temperatura ambiente muy baja, vigila que el agua no baje de 13°C.';
    else if (temp >= 28) relevanciaPiscicola = '🥵 Calor intenso: revisa oxigenación del agua con más frecuencia.';
    else relevanciaPiscicola = '✅ Condiciones ambientales normales para la operación de la piscigranja.';

    resultado.innerHTML =
      '<div style="border-radius:22px;padding:22px 18px;color:#fff;background:' + fondoTipo(info.tipo) + ';box-shadow:0 10px 24px rgba(0,0,0,0.18);">' +
        '<div style="text-align:center;font-size:14px;font-weight:700;">📍 ' + ciudad.nombre + '</div>' +
        '<div style="text-align:center;font-size:11px;opacity:0.8;margin-bottom:10px;">' + (ciudad.pais||'') + '</div>' +
        '<div style="text-align:center;font-size:64px;line-height:1;">' + info.ico + '</div>' +
        '<div style="text-align:center;font-size:50px;font-weight:800;margin-top:6px;">' + temp + '°</div>' +
        '<div style="text-align:center;font-size:15px;font-weight:600;opacity:0.95;">' + info.desc + '</div>' +
        '<div style="text-align:center;font-size:11.5px;opacity:0.75;margin-top:2px;">Sensación ' + sens + '°</div>' +

        '<div style="display:flex;gap:8px;margin-top:18px;">' +
          '<div style="flex:1;background:rgba(255,255,255,0.16);border-radius:14px;padding:10px;text-align:center;"><div style="font-size:18px;">💧</div><div style="font-size:13px;font-weight:700;margin-top:2px;">' + hum + '%</div><div style="font-size:9px;opacity:0.75;">Humedad</div></div>' +
          '<div style="flex:1;background:rgba(255,255,255,0.16);border-radius:14px;padding:10px;text-align:center;"><div style="font-size:18px;">💨</div><div style="font-size:13px;font-weight:700;margin-top:2px;">' + viento + ' km/h</div><div style="font-size:9px;opacity:0.75;">Viento</div></div>' +
        '</div>' +

        '<div style="font-size:11px;font-weight:700;opacity:0.8;margin:18px 0 8px 2px;">PRÓXIMOS 5 DÍAS</div>' +
        diasHTML +
      '</div>' +

      '<div class="info-box" style="margin-top:14px;">' + relevanciaPiscicola + '</div>';
  }

  var debounce;
  inputCiudad.addEventListener('input', function(){
    clearTimeout(debounce);
    var val = this.value;
    debounce = setTimeout(function(){ buscarSugerencias(val); }, 380);
  });
  inputCiudad.addEventListener('keydown', function(e){
    if (e.key === 'Enter') { e.preventDefault(); buscarPrimero(this.value); }
  });
  btnBuscar.addEventListener('click', function(){ buscarPrimero(inputCiudad.value); });
  document.addEventListener('click', function(e){
    if (!e.target.closest('.buscador')) sugerencias.style.display = 'none';
  });

  function buscarSugerencias(q){
    if (!q || q.trim().length < 2) { sugerencias.style.display='none'; return; }
    fetch('https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(q.trim()) + '&count=5&language=es&format=json')
      .then(function(r){ return r.json(); })
      .then(function(data){
        sugerencias.innerHTML = '';
        if (!data.results || !data.results.length) { sugerencias.style.display='none'; return; }
        data.results.forEach(function(l){
          var div = document.createElement('div');
          div.style.padding = '11px 14px';
          div.style.fontSize = '13.5px';
          div.style.borderBottom = '1px solid #f0f0f0';
          div.style.cursor = 'pointer';
          div.innerHTML = '<strong>' + l.name + '</strong><div style="color:#999;font-size:11.5px;">' + (l.admin1||'') + (l.country ? ', '+l.country : '') + '</div>';
          div.onclick = function(){
            sugerencias.style.display = 'none';
            inputCiudad.value = l.name;
            cargarClima({ nombre:l.name, pais:(l.admin1?l.admin1+', ':'')+(l.country||''), lat:l.latitude, lon:l.longitude });
          };
          sugerencias.appendChild(div);
        });
        sugerencias.style.display = 'block';
      }).catch(function(){ sugerencias.style.display='none'; });
  }

  function buscarPrimero(q){
    if (!q || q.trim().length < 2) return;
    sugerencias.style.display = 'none';
    fetch('https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(q.trim()) + '&count=1&language=es&format=json')
      .then(function(r){ return r.json(); })
      .then(function(data){
        if (data.results && data.results.length) {
          var l = data.results[0];
          cargarClima({ nombre:l.name, pais:(l.admin1?l.admin1+', ':'')+(l.country||''), lat:l.latitude, lon:l.longitude });
        } else {
          TAPP.toast('No se encontró "' + q + '"', 'bad');
        }
      }).catch(function(){ TAPP.toast('Error de conexión', 'bad'); });
  }

  cargarClima(CIUDAD_DEFAULT);
}
// ════════════════════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════════════════════
irAVista('inicio');

</script>
